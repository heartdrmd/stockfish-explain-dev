<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Replay — Stockfish.explain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles/fonts.css">
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="vendor/chessground/chessground.base.css">
  <link rel="stylesheet" href="styles/board.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/panels.css">
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">Stockfish<span class="accent">.explain</span> · Replay</h1>
    <nav class="site-nav">
      <span class="pill" style="background: var(--c-bad); color: white;">🔒 ENGINE LOCKED OFF</span>
      <button id="r-flip" class="btn" title="Flip board">⇅ Flip</button>
      <button id="r-close" class="btn" title="Close window">✕ Close</button>
    </nav>
  </header>

  <main class="replay-main">
    <section class="replay-board-wrap">
      <div id="r-board" class="cg-wrap"></div>
      <div class="board-nav">
        <button id="r-start" class="nav-btn" title="Start">⏮</button>
        <button id="r-prev"  class="nav-btn" title="Prev (←)">◀</button>
        <button id="r-next"  class="nav-btn" title="Next (→)">▶</button>
        <button id="r-end"   class="nav-btn" title="End">⏭</button>
        <span id="r-ply-label" class="nav-ply muted">ply 0/0</span>
      </div>
    </section>

    <section class="replay-info">
      <div class="replay-players">
        <div class="r-player r-white">
          <div class="r-player-label">WHITE</div>
          <div class="r-player-name" id="r-white-name">—</div>
          <div class="r-player-tag muted" id="r-white-tag">Engine ?</div>
        </div>
        <div class="r-vs">vs</div>
        <div class="r-player r-black">
          <div class="r-player-label">BLACK</div>
          <div class="r-player-name" id="r-black-name">—</div>
          <div class="r-player-tag muted" id="r-black-tag">Engine ?</div>
        </div>
      </div>
      <div class="side-card">
        <h3 id="r-header">Game</h3>
        <p class="muted" id="r-meta"></p>
        <div style="display:flex; gap:6px; margin-top:10px;">
          <button id="r-copy-fen" class="btn" title="Copy current position FEN">📋 FEN</button>
          <button id="r-copy-pgn" class="btn" title="Copy PGN of full game">📋 PGN</button>
          <button id="r-save-pgn" class="btn" title="Download PGN file">💾 Save PGN</button>
        </div>
      </div>
      <div class="side-card">
        <h3>Moves</h3>
        <div id="r-move-list" class="tview2-column"></div>
      </div>
    </section>
  </main>

  <script type="module">
    import { Chessground } from './vendor/chessground/chessground.js';
    import { Chess }       from './vendor/chess.js/chess.js';

    // Load game data from sessionStorage — key passed as ?k=...
    const url = new URL(location.href);
    const key = url.searchParams.get('k');
    const raw = key ? sessionStorage.getItem(key) : null;
    const game = raw ? JSON.parse(raw) : null;

    if (!game) {
      document.getElementById('r-header').textContent = 'No game data found';
      document.getElementById('r-meta').textContent =
        'Open this page from the tournament log in the main window.';
    } else {
      init(game);
    }

    function init(game) {
      // White/Black player display
      const whiteIsA = game.whiteFlavor === 'A';
      const whiteName = whiteIsA ? (game.flavorA || 'Engine A') : (game.flavorB || 'Engine B');
      const blackName = whiteIsA ? (game.flavorB || 'Engine B') : (game.flavorA || 'Engine A');
      document.getElementById('r-white-name').textContent = whiteName;
      document.getElementById('r-white-tag').textContent  = 'Engine ' + (whiteIsA ? 'A' : 'B');
      document.getElementById('r-black-name').textContent = blackName;
      document.getElementById('r-black-tag').textContent  = 'Engine ' + (whiteIsA ? 'B' : 'A');

      // Header
      document.getElementById('r-header').textContent =
        `Tournament game #${game.gameNum || ''} — ${game.result || ''}`;
      document.getElementById('r-meta').innerHTML = `
        <strong>Opening:</strong> ${game.openingName || '(none)'}<br>
        <strong>Plies:</strong> ${game.plyCount || game.uciMoves.length}<br>
        <strong>Time control:</strong> ${game.timeControl || '?'}
      `;

      // Build a chess.js history by replaying the uciMoves
      const chess = new Chess();
      const positions = [{ fen: chess.fen(), san: null, uci: null }];
      for (const uci of game.uciMoves) {
        const from = uci.slice(0,2), to = uci.slice(2,4);
        const promotion = uci.length > 4 ? uci[4] : undefined;
        try {
          const mv = chess.move({ from, to, promotion });
          if (!mv) break;
          positions.push({ fen: chess.fen(), san: mv.san, uci, from, to });
        } catch { break; }
      }

      // Board
      let orientation = 'white';
      const cg = Chessground(document.getElementById('r-board'), {
        fen: positions[0].fen,
        orientation,
        movable: { free: false, color: undefined, dests: new Map() },
        draggable: { enabled: false },
        selectable: { enabled: false },
        drawable: { enabled: true },
      });

      // Give the board a decent default size
      document.getElementById('r-board').style.width  = '560px';
      document.getElementById('r-board').style.height = '560px';

      // Move-list rendering with click-to-jump
      const moveListEl = document.getElementById('r-move-list');
      function renderMoveList(currentPly) {
        const rows = [];
        let num = 1;
        for (let i = 1; i < positions.length; i += 2) {
          const white = positions[i];
          const black = positions[i + 1];
          rows.push(`<div class="move-num">${num}</div>`);
          rows.push(`<div class="move ${i===currentPly?'current':''}" data-ply="${i}">${white?.san || ''}</div>`);
          rows.push(`<div class="move ${i+1===currentPly?'current':''}" data-ply="${i+1}">${black?.san || ''}</div>`);
          num++;
        }
        moveListEl.innerHTML = rows.join('');
        moveListEl.querySelectorAll('.move').forEach(el => {
          el.addEventListener('click', () => goTo(+el.dataset.ply));
        });
      }

      // Navigation
      let ply = 0;
      function updatePlyLabel() {
        const el = document.getElementById('r-ply-label');
        el.textContent = `ply ${ply}/${positions.length - 1}`;
      }
      function goTo(p) {
        ply = Math.max(0, Math.min(positions.length - 1, p));
        const pos = positions[ply];
        cg.set({
          fen: pos.fen,
          lastMove: pos.from ? [pos.from, pos.to] : undefined,
        });
        renderMoveList(ply);
        updatePlyLabel();
      }
      goTo(positions.length - 1);   // start at end; user scrubs back

      document.getElementById('r-start').addEventListener('click', () => goTo(0));
      document.getElementById('r-prev').addEventListener('click',  () => goTo(ply - 1));
      document.getElementById('r-next').addEventListener('click',  () => goTo(ply + 1));
      document.getElementById('r-end').addEventListener('click',   () => goTo(positions.length - 1));

      document.addEventListener('keydown', (e) => {
        const tag = (e.target.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
        if (e.key === 'ArrowLeft')  { goTo(ply - 1); e.preventDefault(); }
        if (e.key === 'ArrowRight') { goTo(ply + 1); e.preventDefault(); }
        if (e.key === 'Home')       { goTo(0); e.preventDefault(); }
        if (e.key === 'End')        { goTo(positions.length - 1); e.preventDefault(); }
        if (e.key.toLowerCase() === 'f') { orientation = orientation === 'white' ? 'black' : 'white'; cg.set({ orientation }); }
      });

      // Mouse-wheel nav
      document.getElementById('r-board').addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.deltaY > 0) goTo(ply + 1);
        else if (e.deltaY < 0) goTo(ply - 1);
      }, { passive: false });

      document.getElementById('r-flip').addEventListener('click', () => {
        orientation = orientation === 'white' ? 'black' : 'white';
        cg.set({ orientation });
      });

      // Copy FEN / PGN / Save PGN
      const pgnText = (() => {
        const c = new Chess();
        let s = `[Event "Stockfish.explain tournament replay"]\n[White "${whiteName}"]\n[Black "${blackName}"]\n[Result "${(game.result || '*').replace(/\s.*/,'')}"]\n\n`;
        for (let i = 0; i < game.uciMoves.length; i++) {
          const uci = game.uciMoves[i];
          try {
            const mv = c.move({ from: uci.slice(0,2), to: uci.slice(2,4), promotion: uci.length>4?uci[4]:undefined });
            if (!mv) break;
            if (i % 2 === 0) s += `${Math.floor(i/2)+1}. `;
            s += mv.san + ' ';
          } catch { break; }
        }
        s += (game.result || '*').replace(/\s.*/, '') + '\n';
        return s;
      })();
      document.getElementById('r-copy-fen').addEventListener('click', async () => {
        try { await navigator.clipboard.writeText(positions[ply].fen); } catch { prompt('Copy FEN:', positions[ply].fen); }
      });
      document.getElementById('r-copy-pgn').addEventListener('click', async () => {
        try { await navigator.clipboard.writeText(pgnText); } catch { prompt('Copy PGN:', pgnText); }
      });
      document.getElementById('r-save-pgn').addEventListener('click', () => {
        const blob = new Blob([pgnText], { type: 'application/x-chess-pgn' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `game-${game.gameNum || Date.now()}.pgn`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });
      document.getElementById('r-close').addEventListener('click', () => {
        if (key) sessionStorage.removeItem(key);
        window.close();
      });

      // Clean up session storage when window closes
      window.addEventListener('beforeunload', () => {
        if (key) sessionStorage.removeItem(key);
      });
    }
  </script>
</body>
</html>
